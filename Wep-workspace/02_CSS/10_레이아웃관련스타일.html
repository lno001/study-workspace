<!DOCTYPE html>
<html lang="en">
<head>
    <title>1번입니다</title>

    <style>
        .size-test{
            border: 10px solid brown;
            height: 200px;
            background-color: aquamarine;
        }

        #test1{
            width: 40%;
        }

        #test2{
            width: 400px;
        }

        .nemo{
            width: 150px;
            height: 150px;
            border: 1px solid black;
        }

        .red{
            background: red;
        }
        .green{
            background: green;
        }
        .blue{
            background: blue;
        }
        .yellow{
            background-color: yellow;
        }
        .pink{
            background-color: pink;
        }

        .inline{
            display: inline;
        }

        .ib{
            display: inline-block;
        }

    </style>
</head>
<body>
    
<div id="size">
    <div id="test1" class="size-test"></div>
    <div id="test2" class="size-test"></div>
</div>

<div class="nemo inline red">1</div>
<div class="nemo inline green">2</div>
<div class="nemo inline blue">3</div>
<div class="nemo inline yellow">4</div>
<div class="nemo inline pink">5</div>


<br><hr><br>

<div class="nemo ib red">1</div>
<div class="nemo ib green">2</div>
<div class="nemo ib blue">3</div>
<div class="nemo ib yellow">4</div>
<div class="nemo ib pink">5</div>

<br><hr><br>

<div class="nemo ib red">1</div
><div class="nemo ib green">2</div
><div class="nemo ib blue">3</div
><div class="nemo ib yellow">4</div
><div class="nemo ib pink">5</div>

</body>
</html>
