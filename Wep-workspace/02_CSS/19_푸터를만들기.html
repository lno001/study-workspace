<!DOCTYPE html>
<html lang="en">
<head>
    <title>푸터영역</title>

    <style>
        footer, div, p{
            /* border: 1px solid red; */
            box-sizing: border-box;
        }
        footer {
            width: 1000px;
            height: 160px;
        }

        footer{
            background-color: #f9f9f9;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
        }

        #footer_1{
            border-bottom: 1px solid #fafafa;
            background-color: #eeeeee;
        }
        #footer_1>a{
            color: #1a1a1a;
            text-decoration: none;
            border-right: 1px solid #1a1a1a;
            margin-right: 16px;
            padding-right: 16px;
            font-size: 13px;
            font-weight: 600;
            line-height: 30px;
            

            &:last-child{
                border-right: none;
            }
            &:hover{
                color: rgb(255, 64, 64);
            }
        }

        #footer_2 p{
            margin: 0;
        }

        #p_1{
            font-size: 12px;
            color: #323232;
            padding-top: 12px;
            padding-bottom: 6px;
        }

        #p_2{
            font-size: 11px;
            color: #a5a5a5;
            padding: 8px;
        }

    </style>
</head>
<body>
    <footer>
        <div id="footer_1">
            <a href="#">이용약관</a>
            <a href="#">개인정보처리방침</a>
            <a href="#">인재 채용 문의</a>
            <a href="#">훈련비 게시</a>
            <a href="#">강사 구인</a>
        </div>
        <div id="footer_2">
            <p id="p_1">
                종로 501강의실 ｜ 대표자 : 이일섭 ｜ 책임자 : 이일섭 ｜ 개인정보관리책임자 : 이일섭
            </p>
            <p id="p_2">
                Copyright © 1998-2026 KH 501 Class All Right Reserved
            </p>
        </div>


    </footer>
</body>
</html>
