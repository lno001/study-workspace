<!DOCTYPE html>
<html lang="en">
<head>
    <title>네비바 안나오는버전</title>
    <style>
        nav, ul, li{
            border: 1px solid red;
            box-sizing: border-box;
        }

        nav{
            width: 1000px;
            height: 40px;
        }

        /* ----------------------------------------------------------- */

        nav{
            border-top: 1px solid #eeeeee;
            border-bottom: 1px solid #eeeeee;
        }

        #navbar{
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        #navbar > li{
            padding: 0 32px;
        }

        #navbar > li > a{
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            text-decoration: none;
            letter-spacing: 1px;

            &:hover{
                color: #eeeeee;
            }
        }
    </style>

</head>
<body>

    <nav>
        <ul id="navbar">
            <li><a href="#">단과반</a></li>
            <li><a href="#">자격증대비반</a></li>
            <li><a href="#">커뮤니티</a></li>
            <li><a href="#">문의하기</a></li>
            <li><a href="#">포트폴리오</a></li>
        </ul>
    </nav>




    
</body>
</html>
