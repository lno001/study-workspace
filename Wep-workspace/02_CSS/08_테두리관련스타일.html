<!DOCTYPE html>
<html lang="en">
<head>
    <title>테두리 관련 스타일</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            border: 3px;
            margin: 20px;
        }

        #test1{
            border-style: dotted;
            border-width: 10px;
            border-color: salmon;
            border-top-style: double;
            border-right-color: blueviolet;
            border-bottom-width: 1px;
        }

        #test2{
            border: 10px dotted yellowgreen;
            border-top: 5px dashed greenyellow;
        }

        #test4{
            border-style: groove;
            border-width: 10px;
        }

        #test5{
            border-style: ridge;
            border-width: 10px;
            border-color: brown;
        }

        #test6{
            border-style: inset;
            border-width: 10px;
        }

        #test7{
            border-style: outset;
            border-width: 10px;

            &:active{
                border-style: inset;
            }

            &:hover{
                cursor: pointer;
            }
        }

        #test8{
            border-style: solid;
        }

        #test9{
            border: solid;
            border-radius: 100px;
        }

        #test10{
            border: solid 1px rgba(0, 0, 0, 0.2);
            border-radius: 4px;

            &:hover{
                box-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
                cursor: pointer;
            }
        }

        #human{
            font-size: 50px;
            font-weight: 900px;
            color: white;
            text-shadow: 0px 0px 4px gray, 
                         0px -5px 4px yellow;
        }

        #btn{
            border: 2px solid orangered;
            width: 200px;
            height: 30px;
            border-radius: 10px;
            background-color: orange;
            color: white;
            font-weight: 800;

            &:hover{
                cursor: pointer;
                background-color: rgba(255, 166, 0, 0.877);
            }
        }
    </style>
</head>
<body>
    
    <div id="test1"></div>
    <div id="test2"></div>
    <div id="test3"></div>
    <div id="test4"></div>
    <div id="test5"></div>
    <div id="test6"></div>
    <div id="test7"></div>
    <div id="test8"></div>
    <div id="test9"></div>
    <div id="test10"></div>

    <br><br><br>

    <div id="human">사람</div>

    <button id="btn">버튼이당</button>



    
</body>
</html>
