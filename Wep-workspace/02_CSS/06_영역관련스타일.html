<!DOCTYPE html>
<html lang='en'>
<head>
    <title>중요한 두가지</title>
    <style>
        .test{
            width: 100px;
            height: 100px;
            background-color: orangered;
            border: 10px solid orange;
        }

        #test1{
            padding: 100px;
        }

        #test2{
            padding: 50px 20px;
        }

        #test3{
            padding: 50px 20px 10px 0px;
        }

        #margin1{
            margin: 50px;
        }

        #margin2{
            margin-top: -150px;
        }

        #margin3{
            /*
            margin-left: auto;
            margin-right: auto;
            */
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>잘 알고 있어야함</h1>

    <span>하하</span>
    <h2 style="border: 1px solid red;">여백 및 관련 스타일</h2>
    <span>하하</span>
    <div style="border: 1px solid blue;">여백 및 관련 스타일</div>
    
    <p>
        padding <br>
        내용물영역과 테두리영역 사이
    </p>

    <div id="test1" class="test">컨텐트 영역</div>
    <p>padding : 100 px</p>
    <div id="test2" class="test">컨텐트 영역</div>
    <p>padding : 50px 20px</p>
    <div id="test3" class="test">컨텐트 영역</div>
    <p>padding : 50px 20px 10px 0px</p>

    <hr>

    <h3>margin</h3>

    <div id="margin1" class="test">컨텐트 영역</div>
    <p>margin : 50px</p>
    <div id="margin2" class="test">컨텐트 영역</div>
    <p>margin-top : -150px</p>
    <div id="margin3" class="test">컨텐트 영역</div>
    <p>margin : auto</p>
</body>
</html>
