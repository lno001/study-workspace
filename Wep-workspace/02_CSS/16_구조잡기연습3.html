<!DOCTYPE html>
<html lang="en">
<head>
    <title>구조잡기연습 3</title>

    <style>
        div, main, header, footer {
            border: 1px solid red;
            box-sizing: border-box;
        }

        #wrap{
            width: 1000px;
            height: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        header, footer {
            flex : 2;
        }

        main {
            flex: 6;
            display: flex;
        }

        #content-1{
            flex: 7;
        }

        #content-2{
            flex: 3;
        }


    </style>
</head>
<body>
    
    <div id="wrap">
        <header></header>
        <main>
            <div id="content-1"></div>
            <div id="content-2"></div>
        </main>
        <footer></footer>
    </div>





</body>
</html>
