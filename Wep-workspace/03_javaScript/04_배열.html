    <h3>배열에 요소를 추가하는 방법</h3>

    <button onclick="addEl();">버튼</button>

    <div id="area2" class="area small"></div>

    <script>
        function addEl() {
            const array1 = []; // 빈 배열 선언하는 방법
            const array2 = new Array(3);

            console.log(array1);
            console.log(array2);

            // 자바였다면?
            array1[0] = '당근';
            array1.push('사과'); // 인덱스 가장 끝에 추가
            array1.unshift('망고'); // 인덱스 0에 추가
            array1.push('수박');
            array1.unshift('복숭아'); // 인덱스 0에 추가

            const num = parseInt(Math.random() * array1.length);
            alert(`오늘의 점심 메뉴는 ${array1[num]} 입니다~`)

            alert(array1.pop());
            alert(array1.shift());


            document.querySelector('#area2').innerHTML = array1;

            console.log(array1);
        }

        const minus = function () { };
        // =>
        const add = () => { };

        const returnFn = function () { return 'abc'; };
        // =>
        const rFn = () => 'abc';

        const xFn = function (num) { return num + 10; };
        // =>
        const zFn = num => num + 10;

    </script>

    <button onclick="holiday();">공휴일 확인하기~</button>

    <script>
        function holiday() {
            const days = ['노동절', '어린이날', '부처님오신날', '크리스마스', '현충일',
                '삼일절', '식목일'];

            // 빨간날 찾아보기 버튼을 누르면 사용자에게 테스트를 입력 받아서
            // 사용자가 입력한 텍스트가 배열의 요소일 경우
            // area3의 content에 XXX은(는) 빨간날이 맞습니다~
            // 입력한 텍스트 요소가 아닐 경우
            // area3의 content에 XXX은(는) 빨간날이 아닙니다~
            const day = prompt('어떤 날을 확인하시나요?');
            // console.log(day);

            // console.log(days.includes(day)); 
            // 결과값이 참/거짓
            // console.log(days.indexOf(day)); 
            // 결과값이 참일 때는 해당 인덱스 번호, 거짓일 때는 -1

            const result = days.includes(day) ? '맞습니다' : '아닙니다';

            document.querySelector('#area3').innerHTML =
                `${day}은(는) 빨간날이 ${result}`;
        }
    </script>

    <div id="area4" class="area small"></div>
    <button onclick="sort();">정렬</button>

    <script>
        function sort() {
            const arr = ['Banana', 'Lemon', 'Apple', '수박', '망고', '용과'];

            const area = document.querySelector('#area4');
            area.innerHTML = `${arr} <br>`;
            arr.sort();
            area.innerHTML += `${arr} <br>`;
            arr.reverse();
            area.innerHTML += `${arr} <br>`;
            
            // slice(begin, end) : 배열의 요소를 추출해줌
            area.innerHTML += `${arr.slice(2, 5)} <br>`;
            area.innerHTML += `${arr.splice(1, 1, '수박박')} <br>`;
            area.innerHTML += `${arr} <br>`;
            area.innerHTML += `${arr.splice(3, 2)} <br>`;
            area.innerHTML += `${arr} <br>`;
        }
    </script>
