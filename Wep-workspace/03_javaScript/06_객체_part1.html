<!DOCTYPE html>
<html lang="en">

<head>
    <title>객체 1</title>
    <style>
        body {
            background: black;
            color: white;
            font-weight: 700;
            font-size: 17px;
        }

        .area {
            background: greenyellow;
            color: black;
            border: 1px solid whitesmoke;
        }

        .small {
            height: 300px;
        }

        .big {
            height: 500px;
        }

        * {
            margin: 0;
            padding: 0;
        }

        div {
            box-sizing: border-box;
        }

        #wrap {
            width: 1200px;
            height: 400px;
            margin: auto;
            box-shadow: 1px 2px 12px lightgrey;
        }

        .card {
            width: 230px;
            height: 360px;
            padding: 7px;
            padding-bottom: 10px;
            display: inline-block;

            &:hover {
                box-shadow: 1px 2px 6px lightgrey;
            }
        }

        .card img {
            width: 100%;
            height: 300px;
        }

        .card h4 {
            font-weight: 600;
            font-size: 17px;
        }

        .card p {
            width: 100%;
        }
    </style>
</head>

<body>

    <h1>객체</h1>

    <p>
        property(속성) + value(속성값)를 한쌍으로 저장하는 자료구조 <br>
        여러개의 속성을 하나의 변수에 담을 수 있게 사용하는 데이터 타입 <br><br>

        자바로 따지면 => DTO / VO / Map <br><br>

        -객체는 중괄호 {}를 사용해서 선언 <br>
        중괄호 안에 객체가 가져야할 속성(Property)를 정의함 <br>
        참고로 속성값은 모든 자료형 전부 가능
    </p>

    <div id="area" class="area big"></div>
    <button onclick="createObj();"> 자바스크립트 객체 별거 없네~~ </button>

    <script>
        function createObj() {
            // 네이버 웹툰
            // 데이터베이스 -> 웹툰 -> 웹툰의 정보를 저장

            const array = [
                1,
                '캐슬2',
                '정연',
                '수요일',
                3
            ];

            const castle = {
                "webtoonNo": 1,
                "webtoonName": "캐슬2",
                "webtoonAuthor": "정연",
                "dayOfTheWeek": "수요일",
                "cookie": 3
            }

            console.log(array);
            console.log(castle);

            const area = document.querySelector('#area');
            area.innerHTML = `배열 : ${array} <br>
                              객체 : ${castle} <br>
                              <strong>1번방법</strong><br>
                              웹툰 정보<br>
                              번호 : ${castle.webtoonNo}<br>
                              제목 : ${castle.webtoonName}<br>
                              작가 : ${castle.webtoonAuthor}<br>
                              요일 : ${castle["dayOfTheWeek"]}<br>
                              쿠키 : ${castle["cookie"]}<br>`
        }
    </script>


    <div id="wrap"></div>

    <button onclick="webtoon();">웹툰을 봅시다</button>

    <script>
        function 요청보내는함수() {

        };
        function webtoon() {
            요청보내는함수();

            const webtoons = [
                {
                    "image": "https://image-comic.pstatic.net/webtoon/850103/thumbnail/thumbnail_IMAG21_d4a4a73c-a07c-4c17-bdbc-bc4b8e873792.jpg",
                    "title": "이세계서 유뷰남된 썰",
                    "author": "판테라, 팀 포레스티브 / 김혜령"
                },
                {
                    "image": "https://image-comic.pstatic.net/webtoon/849744/thumbnail/thumbnail_IMAG21_59874523-9c8a-4edd-8810-a3a06bf16f4b.jpg",
                    "title": "소녀*구원대행",
                    "author": "한기주 / 도하예"
                },
                {
                    "image": "https://image-comic.pstatic.net/webtoon/841638/thumbnail/thumbnail_IMAG21_bca5c419-9130-4d1b-b5a9-a953b8aed3d8.jpg",
                    "title": "미생물",
                    "author": "기제희"
                },
                {
                    "image": "https://image-comic.pstatic.net/webtoon/828920/thumbnail/thumbnail_IMAG21_19ce0f7d-7134-403a-bbc5-4f939cd8927f.jpg",
                    "title": "청춘 러브썸",
                    "author": "홍덕 / NEMONE"
                },
                {
                    "image": "https://image-comic.pstatic.net/webtoon/818434/thumbnail/thumbnail_IMAG21_c704029b-5230-401a-a20d-c8a2179f75fa.jpg",
                    "title": "아카데미 플레이어를 죽였다",
                    "author": "기린그린 / 사람살려."
                }
            ];
            // console.log(webtoons);

            const el = webtoons.map(w => `<div class="card">
                                              <img src="${w.image}" />
                                              <h4>${w.title}</h4>
                                              <p>${w.author}</p>
                                          </div>`).join('');

            document.querySelector('#wrap').innerHTML = el;


        }
    </script>











    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>

</html>
